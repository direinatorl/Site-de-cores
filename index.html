<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectra | Gerador de Paletas de Cores</title>
    <meta name="description" content="Gere paletas de cores incríveis instantaneamente e extraia cores de suas imagens favoritas.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Stage 1: Pre-Landing -->
    <section id="stage-1" class="stage active">
        <div class="pre-landing-content">
            <h2 class="question">Você já parou para pensar como são as cores em códigos?</h2>
            <button class="btn-primary" id="btn-start">Descobrir agora</button>
            <div class="auto-timer-container">
                <div class="timer-bar" id="timer-bar"></div>
            </div>
        </div>
    </section>

    <!-- Stage 2: The Generator (First Code) -->
    <section id="stage-2" class="stage hidden">
        <div class="container">
            <header>
                <div class="logo">Spectra.</div>
                <div class="actions-group">
                    <button class="btn-secondary" id="btn-copy-all">Copiar Tudo</button>
                    <button class="btn-primary" id="btn-new-palette">Nova Paleta</button>
                </div>
            </header>
            
            <div class="palette-grid" id="palette-container">
                <!-- Color cards here -->
            </div>

            <div class="stage-footer">
                <p class="hint">Pressione <kbd>Espaço</kbd> para gerar</p>
                <button class="btn-cta" id="btn-next-to-image">Analisar Minha Imagem &rarr;</button>
            </div>
        </div>
    </section>

    <!-- Stage 3: Image Identification (Real Function) -->
    <section id="stage-3" class="stage hidden">
        <div class="container">
            <header>
                <button class="btn-icon" id="btn-back-to-gen">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <div class="logo">Identificador</div>
            </header>

            <main class="image-section">
                <div class="section-header">
                    <h2>Função Real</h2>
                    <p>Extraia cores hexadecimais de qualquer imagem</p>
                </div>
                
                <div class="drop-area" id="drop-area">
                    <input type="file" id="file-input" hidden accept="image/*">
                    <img id="image-preview" alt="Preview" src="background.png" style="display: block;">
                    <button class="btn-overlay" id="btn-change-image">Trocar Imagem</button>
                </div>

                <div class="extracted-colors" id="extracted-colors"></div>
            </main>
        </div>
    </section>

    <canvas id="color-canvas" style="display:none;"></canvas>

    <script src="script.js"></script>
</body>
</html>
